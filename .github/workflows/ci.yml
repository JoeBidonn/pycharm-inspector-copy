name:CI

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Temurin JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run ktlint
        run: gradle ktlintCheck --stacktrace

      - name: Build plugin with system Gradle
        run: gradle buildPlugin --stacktrace

      - name: Verify plugin with system Gradle
        run: gradle verifyPlugin --stacktrace

      - name: Upload plugin distribution
        uses: actions/upload-artifact@v4
        with:
          name: plugin-distribution
          path: build/distributions/*.zip
          if-no-files-found: error

      - name: Upload verification reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: plugin-verification-reports
          path: build/reports/**
          if-no-files-found: ignore
